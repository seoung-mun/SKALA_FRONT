<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Holiday</title>
  </head>
  <body>
    <h1>🛋️ 나의 휴일 일과</h1>
    <p>
      평일에 부족했던 잠도 채우고, 하고 싶은 거 하면서 보내는 하루.<br />
      딱히 계획은 없지만 대충 이런 흐름으로 지낸다. 😎
    </p>

    <h2>🌅 오전</h2>
    <p><mark>09:00 ~</mark> 🥱 알람 없이 눈 떠질 때까지 자기</p>
    <p><mark>10:00 ~ 12:00</mark> 🏃 밀린 운동 좀 하기</p>
    <p><mark>12:00 ~</mark> 🍳 느지막이 브런치</p>

    <h2>☀️ 오후</h2>
    <p><mark>13:00 ~</mark> 🚶 동네 한 바퀴 산책</p>
    <p><mark>14:00 ~</mark> ☕ 괜찮은 카페 찾아서 커피 한 잔</p>

    <h2>🌆 저녁</h2>
    <p><mark>19:00 ~</mark> 🍽️ 저녁 챙겨 먹기</p>
    <p><mark>20:00 ~</mark> 🎬 보고 싶던 영화 한 편</p>
    <p><mark>22:00 ~</mark> 🛌 적당히 놀다가 잠들기</p>
  </body>
</html>
